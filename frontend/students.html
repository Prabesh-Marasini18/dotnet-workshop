<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="students.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Student Manager</h1>
            <nav>
                <a href="weather.html">Weather Forecast</a>
                <span>|</span>
                <a href="students.html">Students</a>
            </nav>
        </header>

        <main>
            <!-- Form Section -->
            <section class="form-section">
                <h2>Add/Edit Student</h2>
                <form id="studentForm">
                    <div class="form-group">
                        <label for="studentId">Student ID:</label>
                        <input type="text" id="studentId" name="id" required>
                    </div>

                    <div class="form-group">
                        <label for="studentName">Name:</label>
                        <input type="text" id="studentName" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="studentAge">Age:</label>
                        <input type="number" id="studentAge" name="age" min="1" required>
                    </div>

                    <div class="form-group">
                        <label for="studentCourse">Course:</label>
                        <input type="text" id="studentCourse" name="course" required>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" id="submitBtn" class="btn btn-primary">Add Student</button>
                        <button type="button" id="clearBtn" class="btn btn-secondary">Clear</button>
                    </div>
                </form>
                <div id="message" class="message"></div>
            </section>

            <!-- Students List Section -->
            <section class="list-section">
                <h2>Student List</h2>
                <div id="studentsContainer" class="students-container">
                    <div class="loading">Loading students...</div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 Student Management System. All rights reserved.</p>
        </footer>
    </div>

    <script src="students.js"></script>
</body>
</html>
